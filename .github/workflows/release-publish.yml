# When the release PR (branch release/next) is merged, tag the merge commit
# and publish the GitHub Release with the changelog section as notes.
# GitHub-specific shell — swap `gh release create` per forge if migrating.
name: release-publish

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

env:
  COG_VERSION: "7.0.0"

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install cocogitto
        run: |
          curl -sSL "https://github.com/cocogitto/cocogitto/releases/download/${COG_VERSION}/cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo mv x86_64-unknown-linux-musl/cog /usr/local/bin/cog

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          VERSION="$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION" "$MERGE_SHA"
          git push origin "$VERSION"
          cog changelog --at "$VERSION" > /tmp/notes.md
          gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/notes.md
