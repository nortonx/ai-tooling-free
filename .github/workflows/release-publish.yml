# When the release PR (branch release/next) is merged, tag the merge commit
# and publish the GitHub Release with the changelog section as notes.
# GitHub-specific shell — swap `gh release create` per forge if migrating.
name: release-publish

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

env:
  COG_VERSION: "7.0.0"
  # sha256 of cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz (upstream
  # publishes no checksums; pinned manually, cross-checked against aqua's
  # independently verified copy)
  COG_SHA256: "e03938ff2c4c86d71c00c0f3284dbbe95c5ca76fe34a51f33e945c23010d59bb"

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install cocogitto
        run: |
          curl -fsSL "https://github.com/cocogitto/cocogitto/releases/download/${COG_VERSION}/cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/cog.tar.gz
          echo "${COG_SHA256}  /tmp/cog.tar.gz" | sha256sum -c -
          tar xzf /tmp/cog.tar.gz -C /tmp
          sudo mv /tmp/x86_64-unknown-linux-musl/cog /usr/local/bin/cog

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          VERSION="$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          if [ -z "$VERSION" ]; then
            echo "Could not parse vX.Y.Z from PR title: $PR_TITLE"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Existence guards make reruns after partial failure safe.
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists, skipping tag creation"
          else
            git tag "$VERSION" "$MERGE_SHA"
            git push origin "$VERSION"
          fi
          cog changelog --at "$VERSION" > /tmp/notes.md
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, skipping"
          else
            gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/notes.md
          fi
