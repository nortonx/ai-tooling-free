# Lints PR commits against the conventional commit spec with `cog check`.
# Guarantees the changelog never silently misses a change.
name: conventional-commits

on:
  pull_request:

permissions:
  contents: read

env:
  COG_VERSION: "7.0.0"
  # sha256 of cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz (upstream
  # publishes no checksums; pinned manually, cross-checked against aqua's
  # independently verified copy)
  COG_SHA256: "e03938ff2c4c86d71c00c0f3284dbbe95c5ca76fe34a51f33e945c23010d59bb"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cocogitto
        run: |
          curl -fsSL "https://github.com/cocogitto/cocogitto/releases/download/${COG_VERSION}/cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/cog.tar.gz
          echo "${COG_SHA256}  /tmp/cog.tar.gz" | sha256sum -c -
          tar xzf /tmp/cog.tar.gz -C /tmp
          sudo mv /tmp/x86_64-unknown-linux-musl/cog /usr/local/bin/cog

      - name: Check PR commits
        run: cog check --ignore-merge-commits "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
